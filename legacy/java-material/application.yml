server:
  port: 7014

spring:
  application:
    name: ns-bbs-material
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ns_bbs?characterEncoding=UTF-8&useSSL=true&serverTimezone=Asia/Shanghai
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: "root"
    password: "22222222"
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: wall,state
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      filter:
        stat:
          enabled: true
          db-type: mysql
          log-slow-sql: true
          slow-sql-millis: 2000
  redis:
    host: 127.0.0.1
    port: 6379
    timeout: 60000
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
  data:
    mongodb:
      uri: mongodb://127.0.0.1:27017/ns_bbs

dubbo:
  application:
    name: ns-bbs-material
  registry:
    address: zookeeper://127.0.0.1:2181
    timeout: 60000
  protocol:
    name: dubbo
    port: 22004
  consumer:
    check: false
    timeout: 60000
  config-center:
    timeout: 60000
  provider:
    filter: -exception

mybatis:
  mapper-locations: classpath*:mybatis/mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true

# RAG服务配置
rag:
  service:
    url: http://localhost:5050

# SiliconFlow API 配置
siliconflow:
  api:
    key: sk-odfltusvtdqsrbycwzspdnqrmhngeuetavpziohmnlrtzbzd
    url: https://api.siliconflow.cn/v1/embeddings
    timeout: 10
  embedding:
    model: BAAI/bge-large-zh-v1.5  # 1024维，更高质量
  rerank:
    url: https://api.siliconflow.cn/v1/rerank
    model: BAAI/bge-reranker-v2-m3
    timeout: 15

# 本地模型服务配置（降级备份）
local:
  embedding:
    url: http://localhost:5052/embed/batch
  rerank:
    url: http://localhost:5052/rerank

# Embedding API 配置
embedding:
  api:
    timeout: 10

# Rerank API 配置
rerank:
  api:
    timeout: 15

