server:
  port: 7010
  servlet:
    context-path: /api

spring:
  application:
    name: ns-bbs-rest
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 1000MB
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: javabackend
    password: javabackend123
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
  redis:
    host: 139.9.78.65
    port: 6222
    password: 5LiA5Liq5Y2B5YiG5aSN5p2C55qE5a+G56CB
    # 单位 毫秒
    timeout: 60000
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1

dubbo:
  application:
    name: ns-bbs-rest
  registry:
    address: zookeeper://127.0.0.1:2181
    timeout: 60000
  protocol:
    name: dubbo
    port: 22001
  consumer:
    check: false
    timeout: 60000
  config-center:
    timeout: 60000
  provider:
    # 配了这个就可以抛出自定义异常（否则一直是RuntimeException）
    filter: -exception

# 自定义
interceptor:
  monitor:
    #是否启用监控
    status: true

cookie:
  # cookie写在对应的域名下
  domain: papervote.top

# swagger打开
swagger:
  show: true

file:
  source:
    # 设定上传源文件允许的最大值（1024*1024*5=5M）
    length: 5242880

# Milvus配置
milvus:
  host: localhost
  port: 19530

# SiliconFlow API配置（使用 OpenRouter 代理）
siliconflow:
  api:
    key: sk-O0qSsP8C1COrvFH0UxqnuB7KmtoCaj1lujVcRd34zvxais1J
    url: https://openrouter.fans/v1/embeddings
  embedding:
    model: Qwen/Qwen3-Embedding-4B

# ============ Agent 配置 ============
agent:
  # 查询改写
  rewriter:
    enabled: true
  # 缓存配置
  cache:
    enabled: true
    local-max-size: 500
    local-ttl-minutes: 5
    redis-ttl-minutes: 30
  # 限流配置
  rate-limiter:
    enabled: true
    anonymous-limit: 5
    normal-limit: 10
    auth-limit: 30
    vip-limit: 120
    global-concurrency: 50
  # 精排配置
  rerank:
    enabled: true
    mode: MOCK  # MOCK 或 CROSS_ENCODER
    candidate-size: 20
    output-size: 5
  # 对话摘要
  summarizer:
    enabled: true
    max-messages: 20
    max-age-minutes: 30
    compress-ratio: 0.5
  # 生命周期管理
  lifecycle:
    idle-timeout-minutes: 30
  # 子 Agent 配置
  max-sub-agent-depth: 3
  sub-agent:
    default-timeout-seconds: 300
  # DAG 编排
  dag:
    max-depth: 10

# ============ 熔断器配置 ============
circuitbreaker:
  failure-threshold: 5
  recovery-threshold: 3
  open-duration-ms: 30000

# ============ gRPC 服务配置 ============
grpc:
  client:
    cross-encoder-service:
      # 支持 Consul 服务发现（生产环境）
      # address: 'discovery:///cross-encoder-service'
      # 开发/单机模式：直接指定地址
      address: 'static://${cross-encoder.service.host:localhost}:${cross-encoder.service.port:50051}'
      negotiationType: plaintext
      connectTimeout: 5000
      idleTimeout: 60000

# ============ Cross-Encoder gRPC 服务配置 ============
cross-encoder:
  service:
    host: localhost
    port: 50051

# ============ MyBatis 配置 ============
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.liang.bbs.rest.service.agent.core
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ============ MongoDB 配置（Agent 上下文持久化） ============
spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/bbs_agent
      database: bbs_agent

# ============ LLM API 密钥配置（生产环境从环境变量读取） ============
llm:
  openrouter:
    api-key: ${OPENROUTER_API_KEY:sk-O0qSsP8C1COrvFH0UxqnuB7KmtoCaj1lujVcRd34zvxais1J}
    base-url: https://openrouter.fans/v1
    model: deepseek-chat
    temperature: 0.7
    max-tokens: 1500
    timeout-seconds: 60
  zju:
    api-key: ${ZJU_API_KEY:sk-kN6W7yfTPK5BP5ED2dB8AaEf26C648888e1bEa715dDb35C4}
    base-url: https://chat.zju.edu.cn/api/ai/v1
    model: qwen3
    temperature: 0.7
    max-tokens: 1500
    timeout-seconds: 60

