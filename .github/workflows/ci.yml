name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: |
          pip install -e .
          pip install pytest pytest-cov
      - run: pytest tests/ --cov=rag_agent_platform --cov-report=term-missing -q
        env:
          ENABLE_LOCAL_FALLBACK: "1"

  java-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: temurin
          cache: maven
      - run: mvn compile -q -DskipTests
